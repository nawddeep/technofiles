[tool:pytest]
# FIX 2.19: Pytest configuration for test discovery and coverage

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categories
markers =
    unit: Unit tests for isolated functions
    integration: Integration tests for multi-component flows
    slow: Slow-running tests
    db: Tests that require database

# Coverage options
addopts =
    --cov=services --cov=models --cov=routes
    --cov-report=html --cov-report=term-missing
    --cov-fail-under=80
    -v

# Ignore files
norecursedirs = .git __pycache__ *.egg-info

# Timeout for tests (prevent hanging)
timeout = 10
