openapi: 3.0.0
info:
  title: SAAITA API
  version: 1.0.0
  description: Secure AI-Powered Learning Assistant API
  contact:
    name: SAAITA Support
    email: support@saaita.com

servers:
  - url: http://localhost:5000/api/v1
    description: Development server
  - url: https://api.saaita.com/api/v1
    description: Production server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: httpOnly cookie (automatic)
    csrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        full_name:
          type: string
        is_onboarded:
          type: boolean
        is_verified:
          type: boolean
      required:
        - id
        - email
        - full_name

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT access token (15 min expiry)
        refresh_token:
          type: string
          description: JWT refresh token (7 day expiry)
        csrf_token:
          type: string
          description: CSRF protection token
        user:
          $ref: '#/components/schemas/User'
      required:
        - access_token
        - refresh_token
        - csrf_token
        - user

    Message:
      type: object
      properties:
        id:
          type: integer
        sender:
          type: string
          enum: [user, ai]
        text:
          type: string
        created_at:
          type: string
          format: date-time

    ChatHistoryResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: object
      required:
        - error

  responses:
    UnauthorizedError:
      description: Authentication required or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Unauthorized"

    ForbiddenError:
      description: User lacks permission
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

security:
  - bearerAuth: []
  - cookieAuth: []

paths:
  /auth/csrf-token:
    get:
      tags:
        - Authentication
      summary: Get CSRF token
      security: []
      responses:
        '200':
          description: CSRF token obtained
          content:
            application/json:
              schema:
                type: object
                properties:
                  csrf_token:
                    type: string
          headers:
            Set-Cookie:
              schema:
                type: string
              description: csrf_token cookie

  /auth/signup:
    post:
      tags:
        - Authentication
      summary: Create new user account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                  minLength: 1
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 12
                  description: Must contain uppercase, lowercase, number, special char
              required:
                - fullName
                - email
                - password
            example:
              fullName: "John Doe"
              email: "john@example.com"
              password: "SecurePass123!@#"
      responses:
        '200':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
          headers:
            Set-Cookie:
              schema:
                type: string
              description: access_token and refresh_token cookies
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Authenticate user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
              required:
                - email
                - password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
          headers:
            Set-Cookie:
              schema:
                type: string
              description: access_token and refresh_token cookies
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  csrf_token:
                    type: string
          headers:
            Set-Cookie:
              schema:
                type: string
              description: New access_token cookie
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout and revoke tokens
      responses:
        '200':
          description: Logged out successfully
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Cleared cookies
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /chat/message:
    post:
      tags:
        - Chat
      summary: Send message and get AI response
      parameters:
        - name: X-Session-Id
          in: header
          schema:
            type: string
          description: Chat session ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                  minLength: 1
                images:
                  type: array
                  items:
                    type: object
                    properties:
                      mime_type:
                        type: string
                        example: "image/jpeg"
                      data:
                        type: string
                        description: Base64 encoded image
              required:
                - prompt
            example:
              prompt: "What is machine learning?"
              images: []
      responses:
        '200':
          description: AI response
          content:
            application/json:
              schema:
                type: object
                properties:
                  text:
                    type: string
                example:
                  text: "Machine learning is a subset of artificial intelligence..."
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /chat/history:
    get:
      tags:
        - Chat
      summary: Get chat history with pagination
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
          description: Messages per page
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Offset for pagination
        - name: X-Session-Id
          in: header
          schema:
            type: string
      responses:
        '200':
          description: Chat history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatHistoryResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /chat/clear:
    post:
      tags:
        - Chat
      summary: Clear all messages in chat session
      parameters:
        - name: X-Session-Id
          in: header
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Chat cleared
        '401':
          $ref: '#/components/responses/UnauthorizedError'

tags:
  - name: Authentication
    description: Login, signup, token refresh
  - name: Chat
    description: Chat history and messaging
