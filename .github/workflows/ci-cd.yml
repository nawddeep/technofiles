# FIX 2.20: GitHub Actions CI/CD pipeline
# Automated testing, linting, and security scanning on every push and PR

name: SAAITA CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    name: Backend Testing
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: [ '3.11', '3.12' ]
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: saaita_user
          POSTGRES_PASSWORD: saaita_secure_pass_123
          POSTGRES_DB: saaita_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:8-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install backend dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with flake8
      continue-on-error: true
      run: |
        cd backend
        pip install flake8
        # Stop the build only on actual errors, not warnings
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Run tests with pytest
      env:
        DATABASE_URL: postgresql://saaita_user:saaita_secure_pass_123@localhost:5432/saaita_test
        REDIS_URL: redis://localhost:6379/0
        JWT_SECRET_KEY: test_secret_key_min_32_chars_required_v1
        ALLOWED_ORIGINS: http://localhost:5173
        ENVIRONMENT: development
      run: |
        cd backend
        pytest tests/ --cov=services --cov=models --cov-report=xml --tb=short
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./backend/coverage.xml
        flags: backend
        fail_ci_if_error: false
  
  frontend-tests:
    name: Frontend Testing
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [ '18.x', '20.x', '22.x' ]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Lint frontend
      continue-on-error: true
      run: |
        cd frontend
        npm run lint
    
    - name: Build frontend
      run: |
        cd frontend
        npm run build
  
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
      continue-on-error: true
    
    - name: Upload Trivy sarif
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true
  
  build-status:
    name: Build Status Check
    runs-on: ubuntu-latest
    needs: [ backend-tests, frontend-tests ]
    if: always()
    
    steps:
    - name: Check build status
      run: |
        if [ "${{ needs.backend-tests.result }}" = "failure" ] || [ "${{ needs.frontend-tests.result }}" = "failure" ]; then
          echo "Build failed"
          exit 1
        fi
        echo "Build passed"
